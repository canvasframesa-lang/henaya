<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100">
  <defs>
    <linearGradient id="sage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#A3BC93"/>
      <stop offset="1" stop-color="#4A6B5D"/>
